<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> Quickath - Tantangan 10 Detik </title>
        <style>
            :root {
                --primary: #6c5ce7;
                --secondary: #a29bfe;
                --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                --correct: #00b894;
                --wrong: #ff7675;
                --text: #2d3436;       
            }

            * {
                box-sizing: border-box;
                font-family: "Segoe UI", 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: var(--bg-gradient);
                color: var(--text);
            }

            /* Card Style */
            .card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                padding: 2rem;
                border-radius: 24px;
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
                width: 90%;
                max-width: 500px;
                text-align: center;
                transition: center;
                animation: fadeIn 0.05s ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .hidden {
                display: none !important;
            }

            /* Typography & Elements */
            h1 {
                color: var(--primary);
                margin-bottom: 0.5rem;
            }
            .timer-bar {
                width: 100%;
                height: 8px;
                background: #eee;
                border-radius: 4px;
                margin: 20px 0;
                overflow: hidden;
            }
            #progress {
                width: 100%;
                height: 100%;
                background: var(--primary);
                transition: width 1s linear;
            }

            .question {
                font-size: 3rem;
                font-weight: bold;
                margin: 20px 0;
                color: var(--text);
            }

            input[type="number"] {
                width: 120px;
                padding: 12px;
                font-size: 1.5rem;
                border: 2px solid #ddd;
                border-radius: 12px;
                text-align: center;
                outline: none;
                transition: border-color 0.3s;
            }

            input[type="number"]:focus {
                border-bottom: var(--primary);
            }

            button {
                background: var(--primary);
                color: white;
                border: none;
                padding: 12px 30px;
                font-size: 1.1rem;
                border-radius: 12px;
                cursor: pointer;
                transition:
                transform 0.2s,
                background 0.3s;
                margin-top: 20px;
            }
            
            button:hover {
                background: var(--secondary);
                transform: scale(1.05);
            }

            /* Table Style */
            .result-container {
                margin-top: 20px;
                overflow-x: auto;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
                font-size: 0.9rem;
            }
            th,
            td {
                padding: 12px;
                border-bottom: 1px solid #ddd;
                text-align: center;
            }
            th {
                background: var(--secondary);
                color: white;
            }
            .row-correct {
                color: var(--correct);
                font-weight: bold;
            }
            .row-wrong {
                color: var(--wrong);
                font-weight: bold;
            }

            / * Animation for Game */
            .shake {
                animation: shake 0.4s;
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0px);
                }
                25% {
                    transform: translateX(-10px);
                }
                75% {
                    transform: translateX(10px);
                }
            }

            .score-badge {
                font-size:  1.5rem;
                font-weight: bold;
                color: var(--primary);
                margin: 10px 0;
            }
            </style>
    </head>
    <body>
        <div class="card" id="game-card">
            <div id="start-screen">
                <h1>Quickmath! ⚡ </h1>
                <p>
                    Jawab 10 soal secepat mungkin. <br />Waktu tiap soal hanya 10 detik!
                    </p>
                    <button onclick="startGame()">Mulai Bermain</button>
            </div>

            <div id="play-screen" class="hidden">
                <div id="quest-number">Soal 1 / 10</div>
                <div class="timer-bar"><div id="progress"></div></div>
                <div class="question" id="display-question"> 0 + 0</div>
                <input
                 type="number"
                 id="answer-input"
                 placeholder="?"
                 autocomplete="off"
                 />
                 <br/>
                 <small>Tekan Enter untuk jawab</small>
                 </div>

                 <div id="result-screen" class="hidden">
                    <h1>Selesai 🎉</h1>
                    <div class="score-badge" id="final-score">Skor: 0</div>
                    <div class="result-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Soal</th>
                                    <th>Input</th>
                                    <th>Benar</th>
                                </tr>
                            </thead>
                            <tbody id="result-body"></tbody>
                        </table>
                        </div>
                        <button onclick="startGame()">Main Lagi</button>
                        </div>
                        </div>

                        <script>
                            let currentQuestion = 0;
                            let score = 0;
                            let timeLeft = 0;
                            let timerInterval;
                            let gameData = [];
                            let currentAnswer = 0;

                            const starScreen = document.getElementById("start-screen");
                            const playScreen = document.getElementById("play-screen");
                            const resultScreen = document.getElementById("result-screen");
                            const inputField = document.getElementById("answer-input");
                            const progress = document.getElementById("progress");

                            function startGame() {
                                currentQuestion = 0;
                                score = 0;
                                gameData = [];
                                startScreen.classList.add("hidden");
                                resultScreen.classList.add("hidden");
                                playScreen.classList.add("hidden");
                                nextQuestion();
                            }

                            function generateQuestion() {
                                const ops = ["+", "-", "*", "/"];
                                let a = Math.floor(Math.random() * 10);
                                let b = Math.floor(Math.random() * 10);
                                let op = ops[Math.floor(Math.random() * 4)];

                                //Validasi pembagian agar tidak desimal dan tidak dibagi nol
                                if (op ==="/") {
                                    if (b === 0) b = 1;
                                    a = a * b; // Menjamin hasil (a/b) adalah b awal (integer)
                                }

                                let qText = `${a} ${op.replace("*", "x").replace("/", "÷")} ${b}`;
                                let ans = 0;
                                if (op === "+") ans = a + b;
                                if (op === "-") ans = a - b;
                                if (op === "*") ans = a * b;
                                if (op === "/") ans = a / b;

                                return { qText, ans };
                            }

                            function nextQuestion() {
                                if (currentQuestion >= 10) {
                                    endgame();
                                    return;
                                }

                                currentQuestion++;
                                document.getElementById("quest-number").innerText = 
                                `Soal ${currentQuestion} / 10`;
                                const q = generateQuestion();
                                document.getElementById("display-question").innerText = q.qText;
                                currentAnswer = q.ans;

                                inputField.value = "";
                                inputField.focus();

                                startTimer();
                            }

                            function startTimer() {
                                clearInterval(timerInterval);
                                timeLeft = 10;
                                progress.style.width = "100%";
                                progress.style.transition = "none";

                                // Force reflow
                                progress.offsetHeight;

                                progress.style.transition = "width 10s linear";
                                progress.style.width = "0%";

                                timerInterval = setInterval(() => {
                                    timeLeft--;
                                    if (timeleft < 0) {
                                        processAnswer(null); //Waktu habis
                                    }
                                }, 1000);
                            }

                            function processAnswer(userValue) {
                                clearInterval(timerInterval);
                                const isCorrect =
                                userValue !== null && parseInt(userValue) === currentAnswer;

                                if (isCorrect) {
                                    score += 10;
                                } else {
                                    document.getElementById("game-card").classList.add("shake");
                                    setTimeout(
                                        () =>
                                        document.getElementById("game-card").classList.remove("shake"),
                                        400,
                                    );
                                }

                                gameData.push({
                                    q: document.getElementById("display-question").innerText,
                                    input: userValue === null ? "Waktu Habis" : userValue,
                                    correct: currentAnswer,
                                    status: isCorrect,
                                });

                                nextQuestion();
                            }

                            function endgame() {
                                playScreen.classList.add("hidden");
                                resultScreen.classList.remove("hidden");
                                document.getElementById("final-score").innerText =arguments
                                `Skor Akhir: ${score}`;

                                const tbody = document.getElementById("result-body");
                                tbody.innerHTML = "";

                                gameData.forEach((item) => {
                                    const row = document.createElement("tr");
                                    row.className = item.status ? "row-correct" : "row-wrong";
                                    row.innerHTML = `
                                        <td>${item.q}</td>
                                        <td>${item.input}</td>
                                        <td>${item.correct}</td>
                                    `;
                                    tbody.appendChild(row);
                                });
                            }

                            inputField.addEventListener("keypress", (e) => {
                                if (e.key === "Enter" && inputField.value !==) {
                                    processAnswer(inputField.value);
                                }
                            });
                        </script>
                        </body>
                        </html>
